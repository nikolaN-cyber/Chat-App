<div class="register-wrapper vh-100 d-flex justify-content-center align-items-center">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-card class="register-card p-4 shadow-sm border-0 d-flex gap-2">
            <mat-card-content class="d-flex gap-3">
                <div class="d-flex flex-column gap-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Username</mat-label>
                        <input matInput formControlName="username" placeholder="Enter username">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>First Name</mat-label>
                        <input matInput formControlName="firstName" placeholder="Enter first name">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Last Name</mat-label>
                        <input matInput formControlName="lastName" placeholder="Enter last name">
                    </mat-form-field>
                </div>
                <div class="d-flex flex-column gap-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Age</mat-label>
                        <input matInput formControlName="age" type="number">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Email</mat-label>
                        <input matInput formControlName="email" placeholder="Enter email">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Password</mat-label>
                        <input matInput formControlName="password" placeholder="Enter password" type="password">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Repeat Password</mat-label>
                        <input matInput formControlName="confirmPassword" placeholder="Repeat password" type="password">
                    </mat-form-field>
                    @if (registerForm.errors?.['passwordMismatch']) {
                        <div>
                            Passwords do not match
                        </div>
                    }
                </div>
            </mat-card-content>
            <mat-card-actions>
                <button mat-flat-button color="primary" type="submit" class="w-100 py-4 fs-6"
                    [disabled]="registerForm.invalid" type="submit">Register</button>
                <a [routerLink]="['/']" mat-button class="mt-2">
                    Already have an account? Sign in here
                </a>
            </mat-card-actions>
        </mat-card>
    </form>
</div>
